# mfactory tripwires — one rule per line:  id :: extensions :: ERE regex :: fix
# extensions: comma list matched against the file suffix, or * for every file.
# Waiver: add `mfactory-allow:<id>` plus a reason on the offending line.
# The hooks directory itself is always excluded by the runner (these patterns
# appear in this file as text).
console-log :: ts,tsx,js,jsx,mjs,cjs :: (^|[^.[:alnum:]_])console\.(log|debug|info)\( :: Remove debug logging. Intentional CLI output belongs in console.error/warn or a logger; otherwise add mfactory-allow:console-log with a reason.
debugger-stmt :: ts,tsx,js,jsx,mjs,cjs :: (^|[[:space:]])debugger([[:space:];]|$) :: Remove the debugger statement before committing.
ts-suppress :: ts,tsx :: @ts-(ignore|nocheck|expect-error) :: Fix the type error instead of hiding it. If genuinely unavoidable, use @ts-expect-error with a reason and mfactory-allow:ts-suppress on the same line.
eslint-disable :: ts,tsx,js,jsx,mjs,cjs :: eslint-disable :: Fix the lint finding instead of silencing it. If the rule is truly wrong here, keep the disable but add mfactory-allow:eslint-disable and the reason on the same line.
test-only :: ts,tsx,js,jsx,mjs,cjs :: (describe|it|test)\.only\( :: A focused test makes CI silently skip the rest of the suite. Remove .only before committing.
private-key :: * :: -----BEGIN [A-Z ]*PRIVATE KEY----- :: A private key must never enter git history. Remove it, rotate the key, and load secrets from the environment.
aws-key :: * :: AKIA[0-9A-Z]{16} :: This matches an AWS access key ID. Remove it, rotate the credential, and load it from the environment.
github-token :: * :: (ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9]{36} :: This matches a GitHub token. Remove it, revoke it at github.com/settings/tokens, and load it from the environment.
model-api-key :: * :: sk-(ant-)?[A-Za-z0-9_-]{24,} :: This matches an Anthropic/OpenAI API key. Remove it, rotate it, and load it from the environment.
